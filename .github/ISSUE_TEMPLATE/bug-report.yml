name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Open AI Image Studio
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages, screenshots, console logs)
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      placeholder: "e.g., Chrome 124, Firefox 126, Safari 17"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
        - Other
    validations:
      required: true
  - type: dropdown
    id: model
    attributes:
      label: AI Model Used
      description: Which model were you using when the issue occurred?
      options:
        - Gemini 3.1 Flash Image
        - Gemini 2.5 Flash Image
        - Gemini 3 Pro Image
        - Imagen 4 Standard
        - Imagen 4 Fast
        - Imagen 4 Ultra
        - N/A
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or console logs
